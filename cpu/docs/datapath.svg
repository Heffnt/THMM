<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 950" font-family="Segoe UI, Arial, sans-serif">
  <!--
    THMM CPU datapath — canonical spec diagram.
    A live React version mirrors this structurally at
    tom.quest/app/thmm/datapath.tsx; when the architecture changes,
    both files must be updated together.

    Layout (rearranged for clarity):
      - Top row:   Clock, Phase, Halt Latch
      - Far left:  Decoder (tall)
      - Far right: RAM (large); IR directly above its top-left
      - Middle:    PC Counter, ProgMux (upper-left), ALU stack (center),
                   Addr Mux (between PC and IR), ALU B Mux (above ALU)
  -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
    <marker id="arrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b00"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#066"/>
    </marker>
  </defs>

  <style>
    .reg  { fill:#d6e4f5; stroke:#222; stroke-width:2; }
    .cnt  { fill:#cce0ff; stroke:#222; stroke-width:2; }
    .mem  { fill:#d5efd5; stroke:#222; stroke-width:2; }
    .mux  { fill:#ffe8c7; stroke:#222; stroke-width:2; }
    .alu  { fill:#f7caca; stroke:#222; stroke-width:2; }
    .dec  { fill:#e0d5f5; stroke:#222; stroke-width:2; }
    .lch  { fill:#ececec; stroke:#222; stroke-width:2; }
    .zd   { fill:#f7e9f7; stroke:#222; stroke-width:2; }
    .data { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arr); }
    .bus  { stroke:#111; stroke-width:2; fill:none; }
    .ctl  { stroke:#b00; stroke-width:1.4; fill:none; marker-end:url(#arrc); stroke-dasharray:5 3; }
    .dec_data { stroke:#066; stroke-width:2; fill:none; marker-end:url(#arrd); }
    .boxt { font-size:14px; font-weight:bold; fill:#111; }
    .sub  { font-size:11px; fill:#222; }
    .val  { font-size:12px; font-weight:bold; fill:#045; font-family:Consolas, monospace; }
    .wl   { font-size:11px; fill:#111; font-family:Consolas, monospace; }
    .cl   { font-size:11px; fill:#b00; font-weight:bold; font-family:Consolas, monospace; }
    .dl   { font-size:11px; fill:#066; font-weight:bold; font-family:Consolas, monospace; }
    .title{ font-size:22px; font-weight:bold; fill:#111; }
    .stit { font-size:13px; fill:#333; }
    .pin  { font-size:10px; fill:#333; font-family:Consolas, monospace; }
  </style>

  <!-- ================================================================
       TOP ROW — Clock, Phase, Halt Latch
       ================================================================ -->

  <rect x="40" y="50" width="180" height="60" class="lch"/>
  <text x="130" y="72" class="boxt" text-anchor="middle">Clock</text>
  <text x="130" y="90" class="sub" text-anchor="middle">CLK · !Halt</text>
  <text x="130" y="104" class="sub" text-anchor="middle">drives all registers</text>

  <rect x="240" y="50" width="180" height="60" class="lch"/>
  <text x="330" y="72" class="boxt" text-anchor="middle">Phase  (T flip-flop)</text>
  <text x="330" y="90" class="sub" text-anchor="middle">toggles on every edge</text>
  <text x="330" y="104" class="val" text-anchor="middle">= 0 (fetch)</text>

  <rect x="440" y="50" width="180" height="60" class="lch"/>
  <text x="530" y="72" class="boxt" text-anchor="middle">Halt Latch</text>
  <text x="530" y="90" class="sub" text-anchor="middle">set by decoder Halt</text>
  <text x="530" y="104" class="val" text-anchor="middle">= 0</text>

  <!-- Halt -> Clock gate, routed above the row -->
  <path class="ctl" d="M 620 60 L 620 38 L 220 38 L 220 60"/>
  <text x="380" y="32" class="cl" text-anchor="middle">Halt → Clock gate</text>

  <!-- ================================================================
       DECODER — far left, tall
       ================================================================ -->

  <rect x="40" y="170" width="240" height="640" class="dec"/>
  <text x="160" y="196" class="boxt" text-anchor="middle">Decoder</text>
  <text x="160" y="214" class="sub" text-anchor="middle">(pure combinational)</text>

  <text x="55" y="240" class="sub">INPUTS:</text>
  <text x="70" y="258" class="wl">  IR (16b)</text>
  <text x="70" y="274" class="wl">  acc_zero (1b)</text>

  <text x="55" y="308" class="sub">CONTROL OUTPUTS:</text>
  <text x="70" y="326" class="cl">  Prog WE</text>
  <text x="70" y="342" class="cl">  Prog Mux</text>
  <text x="70" y="358" class="cl">  Ram WE</text>
  <text x="70" y="374" class="cl">  Alu Mux</text>
  <text x="70" y="390" class="cl">  Alu Opcode (3b)</text>
  <text x="70" y="406" class="cl">  Acc WE</text>
  <text x="70" y="422" class="cl">  Halt</text>

  <text x="55" y="458" class="sub">DATA OUTPUTS:</text>
  <text x="70" y="476" class="dl">  Ram Data  (8b)</text>
  <text x="70" y="492" class="dl">  Alu Data  (16b)</text>

  <text x="55" y="532" class="sub">Notes:</text>
  <text x="55" y="548" class="sub">· WE outputs are ANDed</text>
  <text x="55" y="562" class="sub">  externally with Phase</text>
  <text x="55" y="576" class="sub">  before reaching enables.</text>
  <text x="55" y="596" class="sub">· goif0: Prog WE is ANDed</text>
  <text x="55" y="610" class="sub">  internally with acc_zero.</text>

  <text x="55" y="650" class="sub">Opcode → action:</text>
  <text x="55" y="664" class="pin">0000 nop   0001 halt</text>
  <text x="55" y="678" class="pin">0010 loadm 0011 loadn</text>
  <text x="55" y="692" class="pin">0100 store 0101 goto</text>
  <text x="55" y="706" class="pin">0110 gotoa 0111 addm</text>
  <text x="55" y="720" class="pin">1000 addn  1001 goif0</text>
  <text x="55" y="734" class="pin">1010 subm  1011 mulm</text>
  <text x="55" y="748" class="pin">1100 divm</text>

  <!-- ================================================================
       RAM — far right, large
       ================================================================ -->

  <rect x="1200" y="260" width="460" height="590" class="mem"/>
  <text x="1430" y="288" class="boxt" text-anchor="middle">RAM</text>
  <text x="1430" y="306" class="sub" text-anchor="middle">256 × 16-bit  (single-port, Von Neumann)</text>
  <text x="1430" y="324" class="sub" text-anchor="middle">unified code + data</text>
  <text x="1430" y="440" class="sub" text-anchor="middle">user loads program here</text>
  <text x="1430" y="456" class="sub" text-anchor="middle">before clock starts</text>
  <text x="1215" y="352" class="pin">addr (8b)</text>
  <text x="1215" y="386" class="pin">Din (16b)</text>
  <text x="1215" y="420" class="pin">WE</text>
  <text x="1215" y="290" class="pin">Dout (16b)</text>
  <text x="1215" y="498" class="pin">clk</text>

  <!-- ================================================================
       IR — directly above RAM's top-left
       ================================================================ -->

  <rect x="1200" y="170" width="300" height="70" class="reg"/>
  <text x="1350" y="192" class="boxt" text-anchor="middle">IR  (Instruction Register, 16b)</text>
  <text x="1350" y="210" class="val" text-anchor="middle">= 0x0000</text>
  <text x="1350" y="226" class="sub" text-anchor="middle">WE = !Phase (not a decoder output)</text>

  <!-- ================================================================
       MIDDLE UPPER — PC Counter, ProgMux, Addr Mux
       ================================================================ -->

  <!-- PC Counter -->
  <rect x="340" y="200" width="160" height="90" class="cnt"/>
  <text x="420" y="224" class="boxt" text-anchor="middle">PC  (Counter, 8b)</text>
  <text x="420" y="242" class="sub" text-anchor="middle">CT = !Phase</text>
  <text x="420" y="258" class="sub" text-anchor="middle">LD = ProgWE · Phase</text>
  <text x="420" y="281" class="val" text-anchor="middle">Q = 0x00</text>

  <!-- ProgMux (below PC; output on top feeds PC.D) -->
  <rect x="340" y="320" width="160" height="80" class="mux"/>
  <text x="420" y="342" class="boxt" text-anchor="middle">ProgMux</text>
  <text x="420" y="362" class="sub" text-anchor="middle">0: Acc[7:0]</text>
  <text x="420" y="378" class="sub" text-anchor="middle">1: ALU_out[7:0]</text>
  <text x="380" y="396" class="pin" text-anchor="middle">0</text>
  <text x="460" y="396" class="pin" text-anchor="middle">1</text>

  <!-- Addr Mux -->
  <rect x="800" y="200" width="140" height="100" class="mux"/>
  <text x="870" y="224" class="boxt" text-anchor="middle">Addr Mux</text>
  <text x="870" y="244" class="sub" text-anchor="middle">0: PC</text>
  <text x="870" y="262" class="sub" text-anchor="middle">1: Ram Data</text>
  <text x="870" y="288" class="cl" text-anchor="middle">sel = Phase</text>
  <text x="812" y="224" class="pin">0</text>
  <text x="812" y="284" class="pin">1</text>

  <!-- ================================================================
       MIDDLE LOWER — ALU stack
       ================================================================ -->

  <!-- ALU B Mux -->
  <rect x="760" y="420" width="220" height="80" class="mux"/>
  <text x="870" y="444" class="boxt" text-anchor="middle">ALU B Mux</text>
  <text x="870" y="464" class="sub" text-anchor="middle">0: Alu Data (from decoder)</text>
  <text x="870" y="482" class="sub" text-anchor="middle">1: RAM Dout</text>
  <text x="772" y="444" class="pin">0</text>
  <text x="772" y="484" class="pin">1</text>
  <text x="870" y="514" class="cl" text-anchor="middle" transform="translate(0,-16)">sel = AluMux</text>

  <!-- ALU -->
  <rect x="720" y="540" width="300" height="130" class="alu"/>
  <text x="870" y="568" class="boxt" text-anchor="middle">ALU</text>
  <text x="870" y="588" class="sub" text-anchor="middle">16-bit two&apos;s complement</text>
  <text x="870" y="606" class="sub" text-anchor="middle">Pass / Add / Sub / Mul / Div</text>
  <text x="870" y="630" class="cl" text-anchor="middle">op = Alu Opcode (3b)</text>
  <text x="734" y="568" class="pin">A</text>
  <text x="870" y="558" class="pin" text-anchor="middle">B</text>

  <!-- Acc -->
  <rect x="760" y="710" width="220" height="60" class="reg"/>
  <text x="870" y="734" class="boxt" text-anchor="middle">Acc  (16b)</text>
  <text x="870" y="754" class="val" text-anchor="middle">= 0x0000</text>

  <!-- Zero Detect -->
  <rect x="760" y="800" width="220" height="45" class="zd"/>
  <text x="870" y="822" class="boxt" text-anchor="middle">Zero Detect</text>
  <text x="870" y="838" class="sub" text-anchor="middle">NOR of 16 Acc bits → acc_zero</text>

  <!-- ================================================================
       DATA / ADDRESS WIRES (solid black)
       ================================================================ -->

  <!-- PC.Q -> Addr Mux [0] -->
  <path class="data" d="M 500 220 L 800 220"/>
  <text x="510" y="214" class="wl">pc (8b)</text>

  <!-- ProgMux out (top) -> PC.D (bottom) -->
  <path class="data" d="M 420 320 L 420 290"/>
  <text x="428" y="308" class="wl">D (8b)</text>

  <!-- Addr Mux out -> RAM addr (routed below IR) -->
  <path class="data" d="M 940 260 L 1000 260 L 1000 290 L 1180 290 L 1180 350 L 1200 350"/>
  <text x="1010" y="284" class="wl">addr (8b)</text>

  <!-- RAM Dout -> IR.Din (short, straight up) -->
  <path class="data" d="M 1220 290 L 1220 250 L 1350 250 L 1350 240"/>
  <text x="1228" y="274" class="wl">Dout (16b)</text>

  <!-- RAM Dout -> ALU B Mux [1]  (tap, routed left and down around IR/Addr Mux) -->
  <circle cx="1220" cy="290" r="3" fill="#111"/>
  <path class="data" d="M 1220 290 L 1100 290 L 1100 405 L 962 405 L 962 420"/>
  <text x="1108" y="398" class="wl">Dout → ALU B Mux [1]</text>

  <!-- IR.Q -> Decoder (long wire across the top channel) -->
  <path class="data" d="M 1200 205 L 1150 205 L 1150 150 L 290 150 L 290 260 L 280 260"/>
  <text x="400" y="144" class="wl">IR (16b)</text>

  <!-- Decoder Ram Data -> Addr Mux [1]  (down-right from decoder, around ProgMux) -->
  <path class="dec_data" d="M 280 476 L 312 476 L 312 298 L 790 298 L 790 285 L 800 285"/>
  <text x="320" y="292" class="dl">Ram Data (8b)</text>

  <!-- Decoder Alu Data -> ALU B Mux [0]  -->
  <path class="dec_data" d="M 280 492 L 324 492 L 324 444 L 760 444"/>
  <text x="340" y="438" class="dl">Alu Data (16b)</text>

  <!-- ALU B Mux out (bottom) -> ALU B input (top) -->
  <path class="data" d="M 870 500 L 870 540"/>
  <text x="878" y="524" class="wl">B (16b)</text>

  <!-- ALU out -> Acc.D (top) -->
  <path class="data" d="M 870 670 L 870 710"/>
  <text x="878" y="694" class="wl">alu_out (16b)</text>

  <!-- Acc -> ALU.A  (Acc.Q on bottom; loop around LEFT of ALU up to A on left-top) -->
  <circle cx="870" cy="770" r="3" fill="#111"/>
  <path class="data" d="M 870 770 L 870 790 L 700 790 L 700 568 L 720 568"/>
  <text x="708" y="684" class="wl">A (16b)</text>

  <!-- Acc -> Zero Detect (short down) -->
  <path class="data" d="M 870 770 L 870 800"/>

  <!-- Zero Detect acc_zero -> Decoder input  (down, left, up) -->
  <path class="data" d="M 760 822 L 316 822 L 316 274 L 280 274"/>
  <text x="326" y="816" class="wl">acc_zero</text>

  <!-- Acc low byte -> ProgMux [0]  (tap from Acc → ALU.A wire at y=790) -->
  <circle cx="700" cy="790" r="3" fill="#111"/>
  <path class="data" d="M 700 790 L 380 790 L 380 410 L 380 400"/>
  <text x="388" y="600" class="wl">Acc[7:0] → ProgMux [0]</text>

  <!-- ALU out low byte -> ProgMux [1]  (tap from ALU→Acc wire) -->
  <circle cx="870" cy="690" r="3" fill="#111"/>
  <path class="data" d="M 870 690 L 460 690 L 460 400"/>
  <text x="470" y="684" class="wl">ALU[7:0] → ProgMux [1]</text>

  <!-- Acc -> RAM Din  (tap from Acc→ALU.A wire at (700,790), go far right along y=790) -->
  <path class="data" d="M 700 790 L 1120 790 L 1120 386 L 1200 386"/>
  <text x="1128" y="380" class="wl">Din = Acc (16b)</text>

  <!-- ================================================================
       CONTROL SIGNALS (red dashed)
       ================================================================ -->

  <!-- Prog WE -> PC.LD (decoder out at y=326 → up to PC.LD at (340, 220)) -->
  <path class="ctl" d="M 280 326 L 318 326 L 318 222 L 340 222"/>
  <text x="328" y="216" class="cl">Prog WE</text>

  <!-- Prog Mux sel -> ProgMux sel (left side) -->
  <path class="ctl" d="M 280 342 L 340 342"/>
  <text x="284" y="336" class="cl">Prog Mux</text>

  <!-- Ram WE -> RAM.WE (long right) -->
  <path class="ctl" d="M 280 358 L 1180 358 L 1180 420 L 1200 420"/>
  <text x="540" y="352" class="cl">Ram WE (· Phase)</text>

  <!-- Alu Mux -> ALU B Mux sel (bottom) -->
  <path class="ctl" d="M 280 374 L 640 374 L 640 516 L 870 516 L 870 500"/>
  <text x="550" y="368" class="cl">Alu Mux</text>

  <!-- Alu Opcode -> ALU op (3b) -->
  <path class="ctl" d="M 280 390 L 706 390 L 706 620 L 720 620"/>
  <text x="540" y="384" class="cl">Alu Opcode (3b)</text>

  <!-- Acc WE -> Acc WE (enter Acc from left side) -->
  <path class="ctl" d="M 280 406 L 652 406 L 652 740 L 760 740"/>
  <text x="540" y="400" class="cl">Acc WE (· Phase)</text>

  <!-- Halt -> Halt Latch  (up-left to halt bottom) -->
  <path class="ctl" d="M 280 422 L 300 422 L 300 130 L 530 130 L 530 110"/>
  <text x="310" y="124" class="cl">Halt</text>

  <!-- Phase -> Addr Mux sel (down and right, in channel y=140) -->
  <path class="ctl" d="M 420 110 L 420 140 L 870 140 L 870 200"/>
  <text x="520" y="134" class="cl">Phase → Addr Mux sel</text>

  <!-- !Phase -> IR.WE  (Phase goes right along y=135, down to IR bottom) -->
  <circle cx="420" cy="140" r="3" fill="#b00"/>
  <path class="ctl" d="M 420 140 L 1440 140 L 1440 240"/>
  <text x="1140" y="134" class="cl">!Phase → IR.WE</text>

  <!-- Phase -> PC.CT  (left and down, around PC left) -->
  <path class="ctl" d="M 420 110 L 320 110 L 320 260 L 340 260"/>
  <text x="326" y="126" class="cl">!Phase → PC.CT</text>

  <!-- Halt latch -> Clock gate (handled at top of file) -->

  <!-- ================================================================
       Footer notes
       ================================================================ -->
  <g transform="translate(40,880)">
    <rect x="0" y="0" width="1620" height="60" fill="#fafafa" stroke="#999"/>
    <text x="12" y="20" class="boxt">Two-phase execution (one instruction = two clock cycles). Phase FF toggles every edge — not a decoder output.</text>
    <text x="12" y="38" class="sub"><tspan font-weight="bold">Fetch (Phase=0):</tspan>  Addr Mux picks PC → RAM outputs instruction. On edge: IR latches (WE=!Phase=1), PC counts (CT=!Phase=1), Phase → 1.</text>
    <text x="12" y="54" class="sub"><tspan font-weight="bold">Execute (Phase=1):</tspan>  Addr Mux picks Ram Data → RAM[n]. Decoder drives all outputs. On edge: Acc WE / Ram WE / Prog WE fire (gated by Phase). Phase → 0. goif0 ANDs Prog WE with acc_zero internally.</text>
  </g>

</svg>
