<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1650 1050" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
    <marker id="arrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b00"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#066"/>
    </marker>
  </defs>

  <style>
    .reg  { fill:#d6e4f5; stroke:#222; stroke-width:2; }
    .cnt  { fill:#cce0ff; stroke:#222; stroke-width:2; }
    .mem  { fill:#d5efd5; stroke:#222; stroke-width:2; }
    .mux  { fill:#ffe8c7; stroke:#222; stroke-width:2; }
    .alu  { fill:#f7caca; stroke:#222; stroke-width:2; }
    .dec  { fill:#e0d5f5; stroke:#222; stroke-width:2; }
    .lch  { fill:#ececec; stroke:#222; stroke-width:2; }
    .zd   { fill:#f7e9f7; stroke:#222; stroke-width:2; }
    .data { stroke:#111; stroke-width:2; fill:none; marker-end:url(#arr); }
    .bus  { stroke:#111; stroke-width:2; fill:none; }
    .ctl  { stroke:#b00; stroke-width:1.4; fill:none; marker-end:url(#arrc); stroke-dasharray:5 3; }
    .dec_data { stroke:#066; stroke-width:2; fill:none; marker-end:url(#arrd); }
    .boxt { font-size:14px; font-weight:bold; fill:#111; }
    .sub  { font-size:11px; fill:#222; }
    .val  { font-size:12px; font-weight:bold; fill:#045; font-family:Consolas, monospace; }
    .wl   { font-size:11px; fill:#111; font-family:Consolas, monospace; }
    .cl   { font-size:11px; fill:#b00; font-weight:bold; font-family:Consolas, monospace; }
    .dl   { font-size:11px; fill:#066; font-weight:bold; font-family:Consolas, monospace; }
    .title{ font-size:22px; font-weight:bold; fill:#111; }
    .stit { font-size:13px; fill:#333; }
    .pin  { font-size:10px; fill:#333; font-family:Consolas, monospace; }
    .legend { font-size:12px; fill:#111; }
  </style>

  <!-- Title -->
  <text x="20" y="32" class="title">THMM CPU — Von Neumann, single 256×16b RAM (reset state)</text>
  <text x="20" y="54" class="stit">PC=0x00, Acc=0x0000, IR=0x0000, Phase=0 (fetch), Halt=0. One register only (IR). PC is a Counter component.</text>

  <!-- Legend -->
  <g transform="translate(1330,50)">
    <rect x="0" y="0" width="300" height="110" fill="#fafafa" stroke="#999"/>
    <text x="10" y="18" class="legend">— solid black = data/address bus</text>
    <text x="10" y="36" class="legend">— <tspan fill="#066" font-weight="bold">teal</tspan> = decoder DATA outputs (n)</text>
    <text x="10" y="54" class="legend">— <tspan fill="#b00" font-weight="bold">red dashed</tspan> = decoder CONTROL signals</text>
    <text x="10" y="72" class="legend">— "8b" / "16b" labels = wire width</text>
    <text x="10" y="90" class="legend">— filled dot = wire junction</text>
  </g>

  <!-- ================================================================
       LEFT COLUMN: PC Counter, ProgMux, Phase, Halt, Clock
       ================================================================ -->

  <!-- PC Counter -->
  <rect x="40" y="120" width="200" height="105" class="cnt"/>
  <text x="140" y="144" class="boxt" text-anchor="middle">PC  (Counter, 8b)</text>
  <text x="140" y="162" class="sub" text-anchor="middle">CT = !phase (count on fetch)</text>
  <text x="140" y="178" class="sub" text-anchor="middle">LD = ProgWE · phase  (load on jump)</text>
  <text x="140" y="194" class="sub" text-anchor="middle">D  = ProgMux output (8b)</text>
  <text x="140" y="214" class="val" text-anchor="middle">Q = 0x00</text>

  <!-- ProgMux (source of load-data for PC) -->
  <rect x="40" y="260" width="200" height="80" class="mux"/>
  <text x="140" y="282" class="boxt" text-anchor="middle">ProgMux</text>
  <text x="140" y="302" class="sub" text-anchor="middle">0: Acc[7:0]</text>
  <text x="140" y="320" class="sub" text-anchor="middle">1: ALU_out[7:0]</text>
  <text x="52" y="282" class="pin">0</text>
  <text x="52" y="332" class="pin">1</text>

  <!-- Phase flip-flop -->
  <rect x="40" y="380" width="200" height="65" class="lch"/>
  <text x="140" y="402" class="boxt" text-anchor="middle">Phase (T flip-flop)</text>
  <text x="140" y="420" class="sub" text-anchor="middle">toggles on each CLK edge</text>
  <text x="140" y="438" class="val" text-anchor="middle">= 0 (fetch)</text>

  <!-- Halt latch -->
  <rect x="40" y="475" width="200" height="60" class="lch"/>
  <text x="140" y="497" class="boxt" text-anchor="middle">Halt Latch</text>
  <text x="140" y="513" class="sub" text-anchor="middle">set by decoder Halt</text>
  <text x="140" y="530" class="val" text-anchor="middle">= 0</text>

  <!-- Clock -->
  <rect x="40" y="565" width="200" height="58" class="lch"/>
  <text x="140" y="587" class="boxt" text-anchor="middle">Clock</text>
  <text x="140" y="605" class="sub" text-anchor="middle">CLK_gated = CLK · !Halt</text>
  <text x="140" y="620" class="sub" text-anchor="middle">drives PC, IR, Acc, Phase, RAM</text>

  <!-- ================================================================
       CENTER COLUMN: Addr Mux, RAM, IR
       ================================================================ -->

  <!-- Address Mux -->
  <rect x="360" y="130" width="160" height="120" class="mux"/>
  <text x="440" y="156" class="boxt" text-anchor="middle">Addr Mux</text>
  <text x="440" y="176" class="sub" text-anchor="middle">0: PC</text>
  <text x="440" y="196" class="sub" text-anchor="middle">1: Ram Data (from decoder)</text>
  <text x="440" y="226" class="cl" text-anchor="middle">sel = Phase</text>
  <text x="372" y="178" class="pin">0</text>
  <text x="372" y="218" class="pin">1</text>

  <!-- RAM -->
  <rect x="610" y="120" width="320" height="260" class="mem"/>
  <text x="770" y="148" class="boxt" text-anchor="middle">RAM</text>
  <text x="770" y="168" class="sub" text-anchor="middle">256 × 16-bit  (single-port, Von Neumann)</text>
  <text x="770" y="188" class="sub" text-anchor="middle">unified code + data</text>
  <text x="770" y="220" class="sub" text-anchor="middle">user loads program here</text>
  <text x="770" y="236" class="sub" text-anchor="middle">before clock starts</text>
  <text x="625" y="268" class="pin">addr (8b)</text>
  <text x="625" y="310" class="pin">Din (16b)</text>
  <text x="625" y="342" class="pin">WE</text>
  <text x="915" y="268" class="pin" text-anchor="end">Dout (16b)</text>
  <text x="915" y="370" class="pin" text-anchor="end">clk</text>

  <!-- IR register with bit-split -->
  <rect x="610" y="430" width="320" height="90" class="reg"/>
  <text x="770" y="454" class="boxt" text-anchor="middle">IR  (Instruction Register, 16b)</text>
  <text x="770" y="472" class="val" text-anchor="middle">= 0x0000</text>
  <text x="770" y="490" class="sub" text-anchor="middle">WE pin tied to !Phase (no decoder WE)</text>
  <line x1="690" y1="500" x2="690" y2="520" stroke="#333"/>
  <line x1="770" y1="500" x2="770" y2="520" stroke="#333"/>
  <text x="650" y="514" class="pin" text-anchor="middle">[15:12] op</text>
  <text x="730" y="514" class="pin" text-anchor="middle">[11:8]=0</text>
  <text x="850" y="514" class="pin" text-anchor="middle">[7:0] n</text>

  <!-- ================================================================
       RIGHT CENTER: Decoder
       ================================================================ -->

  <rect x="1000" y="430" width="290" height="470" class="dec"/>
  <text x="1145" y="456" class="boxt" text-anchor="middle">Decoder</text>
  <text x="1145" y="476" class="sub" text-anchor="middle">(pure combinational)</text>

  <text x="1015" y="500" class="sub">INPUTS:</text>
  <text x="1030" y="518" class="wl">  IR (16b)</text>
  <text x="1030" y="534" class="wl">  acc_zero (1b)</text>

  <text x="1015" y="562" class="sub">CONTROL OUTPUTS:</text>
  <text x="1030" y="580" class="cl">  Prog WE</text>
  <text x="1030" y="596" class="cl">  Prog Mux</text>
  <text x="1030" y="612" class="cl">  Ram WE</text>
  <text x="1030" y="628" class="cl">  Alu Mux</text>
  <text x="1030" y="644" class="cl">  Alu Opcode (3b)</text>
  <text x="1030" y="660" class="cl">  Acc WE</text>
  <text x="1030" y="676" class="cl">  Halt</text>

  <text x="1015" y="708" class="sub">DATA OUTPUTS:</text>
  <text x="1030" y="728" class="dl">  Ram Data  (= IR[7:0], 8b)</text>
  <text x="1030" y="746" class="dl">  Alu Data  (= IR[7:0] zero-ext, 16b)</text>

  <text x="1015" y="786" class="sub">NOTE: WE outputs are gated</text>
  <text x="1015" y="802" class="sub">externally by Phase (writes</text>
  <text x="1015" y="818" class="sub">only take effect in execute</text>
  <text x="1015" y="834" class="sub">phase).  Prog WE for goif0</text>
  <text x="1015" y="850" class="sub">is internally ANDed with</text>
  <text x="1015" y="866" class="sub">acc_zero.</text>

  <!-- ================================================================
       RIGHT: ALU B Mux, ALU, Acc, Zero Detect
       ================================================================ -->

  <!-- ALU B Mux -->
  <rect x="1360" y="120" width="200" height="110" class="mux"/>
  <text x="1460" y="148" class="boxt" text-anchor="middle">ALU B Mux</text>
  <text x="1460" y="170" class="sub" text-anchor="middle">0: Alu Data (from decoder)</text>
  <text x="1460" y="190" class="sub" text-anchor="middle">1: RAM Dout</text>
  <text x="1460" y="216" class="cl" text-anchor="middle">sel = Alu Mux</text>
  <text x="1372" y="170" class="pin">0</text>
  <text x="1372" y="210" class="pin">1</text>

  <!-- ALU -->
  <rect x="1360" y="260" width="260" height="140" class="alu"/>
  <text x="1490" y="290" class="boxt" text-anchor="middle">ALU</text>
  <text x="1490" y="312" class="sub" text-anchor="middle">16-bit, two's complement</text>
  <text x="1490" y="330" class="sub" text-anchor="middle">Pass / Add / Sub / Mul / Div</text>
  <text x="1490" y="358" class="cl" text-anchor="middle">op = Alu Opcode (3b)</text>
  <text x="1374" y="290" class="pin">A</text>
  <text x="1374" y="336" class="pin">B</text>

  <!-- Accumulator -->
  <rect x="1360" y="700" width="260" height="75" class="reg"/>
  <text x="1490" y="726" class="boxt" text-anchor="middle">Acc</text>
  <text x="1490" y="744" class="sub" text-anchor="middle">16-bit register</text>
  <text x="1490" y="758" class="sub" text-anchor="middle">WE = Acc WE · Phase · !Halt</text>
  <text x="1490" y="772" class="val" text-anchor="middle">= 0x0000</text>

  <!-- Zero detect -->
  <rect x="1360" y="810" width="260" height="55" class="zd"/>
  <text x="1490" y="834" class="boxt" text-anchor="middle">Zero Detect</text>
  <text x="1490" y="852" class="sub" text-anchor="middle">NOR of all 16 Acc bits  →  acc_zero</text>

  <!-- ================================================================
       WIRES
       ================================================================ -->

  <!-- PC.Q -> Addr Mux [0] -->
  <path class="data" d="M 240 180 L 360 180"/>
  <text x="260" y="175" class="wl">pc (8b)</text>

  <!-- ProgMux out -> PC Counter D -->
  <path class="data" d="M 240 300 L 290 300 L 290 210 L 240 210"/>
  <text x="300" y="258" class="wl">D (8b)</text>

  <!-- Addr Mux out -> RAM addr -->
  <path class="data" d="M 520 190 L 575 190 L 575 265 L 610 265"/>
  <text x="530" y="184" class="wl">addr (8b)</text>

  <!-- Acc -> RAM Din  (long route along the bottom, up) -->
  <path class="data" d="M 1360 735 L 960 735 L 960 540 L 560 540 L 560 310 L 610 310"/>
  <text x="670" y="534" class="wl">Din = Acc (16b)</text>

  <!-- RAM Dout -> IR D -->
  <path class="data" d="M 930 265 L 970 265 L 970 410 L 770 410 L 770 430"/>
  <text x="978" y="260" class="wl">Dout (16b) — instruction during fetch</text>

  <!-- RAM Dout -> ALU B Mux [1]  (tap)  -->
  <circle cx="970" cy="265" r="3" fill="#111"/>
  <path class="data" d="M 970 265 L 970 200 L 1360 200"/>
  <text x="980" y="195" class="wl">Dout (16b) — data during execute</text>

  <!-- IR -> Decoder -->
  <path class="data" d="M 930 520 L 1000 520"/>
  <text x="940" y="514" class="wl">IR (16b)</text>

  <!-- Decoder Ram Data -> Addr Mux [1] -->
  <path class="dec_data" d="M 1000 728 L 330 728 L 330 210 L 360 210"/>
  <text x="340" y="724" class="dl">Ram Data (8b)</text>

  <!-- Decoder Alu Data -> ALU B Mux [0] -->
  <path class="dec_data" d="M 1290 746 L 1310 746 L 1310 160 L 1360 160"/>
  <text x="1316" y="240" class="dl">Alu Data (16b)</text>

  <!-- ALU B Mux -> ALU B -->
  <path class="data" d="M 1460 230 L 1460 260"/>
  <text x="1468" y="252" class="wl">B (16b)</text>

  <!-- Acc -> ALU A  (tap from Acc left edge, up) -->
  <path class="data" d="M 1380 700 L 1380 272 L 1380 260"/>
  <text x="1340" y="430" class="wl">A (16b)</text>

  <!-- ALU out -> Acc -->
  <path class="data" d="M 1490 400 L 1490 700"/>
  <text x="1498" y="550" class="wl">alu_out (16b)</text>

  <!-- ALU out low 8b -> ProgMux [1]  -->
  <circle cx="1490" cy="420" r="3" fill="#111"/>
  <path class="data" d="M 1490 420 L 1330 420 L 1330 480 L 310 480 L 310 320 L 240 320"/>
  <text x="340" y="474" class="wl">alu_out[7:0] → ProgMux [1]</text>

  <!-- Acc low 8b -> ProgMux [0] -->
  <circle cx="1380" cy="700" r="3" fill="#111"/>
  <path class="data" d="M 1380 700 L 1380 668 L 290 668 L 290 280 L 240 280"/>
  <text x="300" y="662" class="wl">Acc[7:0] → ProgMux [0]</text>

  <!-- Acc -> Zero Detect -->
  <path class="data" d="M 1490 775 L 1490 810"/>
  <text x="1498" y="798" class="wl">16b</text>

  <!-- Zero Detect acc_zero -> Decoder input -->
  <path class="data" d="M 1360 835 L 1340 835 L 1340 880 L 970 880 L 970 536 L 1000 536"/>
  <text x="985" y="530" class="wl">acc_zero</text>

  <!-- ================================================================
       CONTROL SIGNALS (red dashed)  —  decoder outputs
       ================================================================ -->

  <!-- Prog WE -> PC Counter LD (gated by phase externally) -->
  <path class="ctl" d="M 1000 580 Q 270 580 270 155 L 240 155"/>
  <text x="280" y="148" class="cl">Prog WE → PC.LD  (via · Phase)</text>

  <!-- Prog Mux -> ProgMux sel -->
  <path class="ctl" d="M 1000 596 Q 260 596 260 300 L 240 300"/>
  <text x="260" y="590" class="cl">Prog Mux → ProgMux sel</text>

  <!-- Ram WE -> RAM WE -->
  <path class="ctl" d="M 1000 612 Q 760 612 760 640 L 760 340" stroke-dasharray="5 3"/>
  <text x="670" y="380" class="cl">Ram WE (· Phase)</text>

  <!-- Alu Mux -> ALU B Mux sel -->
  <path class="ctl" d="M 1290 628 L 1320 628 L 1320 228 L 1340 228"/>
  <text x="1328" y="262" class="cl">Alu Mux</text>

  <!-- Alu Opcode -> ALU -->
  <path class="ctl" d="M 1290 644 L 1490 644 L 1490 400"/>
  <text x="1498" y="642" class="cl">Alu Opcode (3b)</text>

  <!-- Acc WE -> Acc WE -->
  <path class="ctl" d="M 1290 660 L 1630 660 L 1630 735 L 1620 735"/>
  <text x="1500" y="654" class="cl">Acc WE (· Phase)</text>

  <!-- Halt -> Halt latch -->
  <path class="ctl" d="M 1000 676 Q 500 676 280 500 L 240 500"/>
  <text x="300" y="694" class="cl">Halt → Halt Latch</text>

  <!-- Phase -> Addr Mux sel -->
  <path class="ctl" d="M 240 400 L 320 400 L 320 250 L 440 250"/>
  <text x="340" y="394" class="cl">Phase → Addr Mux sel</text>

  <!-- Phase -> IR WE (!phase)  -->
  <path class="ctl" d="M 240 412 L 340 412 L 340 500 L 610 500"/>
  <text x="380" y="494" class="cl">!Phase → IR WE</text>

  <!-- Halt latch -> Clock gate -->
  <path class="ctl" d="M 140 535 L 140 565"/>
  <text x="148" y="558" class="cl">gate</text>

  <!-- ================================================================
       Footer notes
       ================================================================ -->
  <g transform="translate(40,920)">
    <rect x="0" y="0" width="1580" height="115" fill="#fafafa" stroke="#999"/>
    <text x="12" y="22" class="boxt">Two-phase execution (one instruction = two clock cycles). Phase FF toggles on every edge — not a decoder output.</text>
    <text x="12" y="44" class="sub"><tspan font-weight="bold">Phase 0 (fetch):</tspan>  Addr Mux sel=0 → RAM addr = PC → RAM Dout = instruction.  At clock edge: IR ← Dout (IR.WE = !Phase = 1), PC counts (CT = !Phase = 1), Phase → 1.  All other WEs are gated off (· Phase = 0).</text>
    <text x="12" y="64" class="sub"><tspan font-weight="bold">Phase 1 (execute):</tspan>  Addr Mux sel=1 → RAM addr = Ram Data (= IR[7:0]).  Decoder reads IR, drives all control + data outputs.  ALU computes Acc OP (Alu Data or RAM Dout).</text>
    <text x="12" y="82" class="sub">                   At clock edge: if Acc WE → Acc ← alu_out; if Ram WE → RAM[n] ← Acc; if Prog WE → PC.LD ← ProgMux out (overrides the count); Phase → 0.</text>
    <text x="12" y="102" class="sub"><tspan font-weight="bold">goif0:</tspan>  decoder computes Prog WE = (opcode==goif0) · acc_zero — conditional jump absorbed into the existing Prog WE output.  <tspan font-weight="bold">halt:</tspan>  decoder asserts Halt, latch sets, gated clock dies — all registers freeze.</text>
  </g>

</svg>
